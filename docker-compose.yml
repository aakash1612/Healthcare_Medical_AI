version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: medai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ChromaDB Vector DB ───────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: medai-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenConfigServerAuthCredentialsProvider
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python Inference Service ─────────────────────────────────────────
  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: medai-inference
    ports:
      - "8000:8000"
    volumes:
      - ./python-service/weights:/app/weights:ro
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 3

  # ── Express Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medai-backend
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      python-service:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/medical-ai
      - PYTHON_SERVICE_URL=http://python-service:8000
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - FRONTEND_URL=http://localhost:5173
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - uploads_data:/app/uploads

  # ── React Frontend ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  chroma_data:
  uploads_data:
